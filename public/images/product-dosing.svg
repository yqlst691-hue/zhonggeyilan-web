<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="tank" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bdbdbd"/>
      <stop offset="50%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#9e9e9e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- 加药罐 -->
  <rect x="220" y="200" width="160" height="200" rx="10" fill="url(#tank)" stroke="#757575" stroke-width="2"/>
  <rect x="240" y="300" width="120" height="90" fill="#0d9488" opacity="0.3"/>
  <text x="300" y="260" font-family="Arial, sans-serif" font-size="16" fill="#424242" text-anchor="middle">药剂罐</text>
  <!-- 管道 -->
  <path d="M380 300 L450 300 L450 200" stroke="#757575" stroke-width="8" fill="none"/>
  <circle cx="450" cy="200" r="10" fill="#757575"/>
  <!-- 控制箱 -->
  <rect x="460" y="180" width="120" height="80" rx="5" fill="#424242"/>
  <rect x="470" y="195" width="100" height="30" rx="3" fill="#4caf50"/>
  <text x="520" y="215" font-family="monospace" font-size="12" fill="#fff" text-anchor="middle">AUTO</text>
  <text x="520" y="250" font-family="Arial, sans-serif" font-size="10" fill="#bdbdbd" text-anchor="middle">PLC控制器</text>
  <!-- 标注 -->
  <text x="400" y="500" font-family="Arial Black, sans-serif" font-size="36" fill="#2e7d32" text-anchor="middle" font-weight="bold" opacity="0.6">全自动加药设备</text>
</svg>
