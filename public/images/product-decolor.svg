<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#9c27b0;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#9c27b0;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="400" cy="280" r="200" fill="url(#glow)"/>
  <!-- 染料分子 -->
  <circle cx="300" cy="250" r="40" fill="#7b1fa2" opacity="0.6"/>
  <circle cx="360" cy="300" r="30" fill="#6a1b9a" opacity="0.5"/>
  <circle cx="440" cy="260" r="35" fill="#8e24aa" opacity="0.6"/>
  <circle cx="500" cy="310" r="28" fill="#7b1fa2" opacity="0.5"/>
  <circle cx="380" cy="340" r="25" fill="#6a1b9a" opacity="0.4"/>
  <!-- 颜色滴落 -->
  <path d="M300 290 Q310 350 290 400" stroke="#9c27b0" stroke-width="6" fill="none" opacity="0.4"/>
  <path d="M440 295 Q450 360 430 420" stroke="#ab47bc" stroke-width="6" fill="none" opacity="0.4"/>
  <path d="M500 338 Q510 390 490 440" stroke="#9c27b0" stroke-width="6" fill="none" opacity="0.4"/>
  <text x="400" y="490" font-family="Arial Black, sans-serif" font-size="36" fill="#4a148c" text-anchor="middle" font-weight="bold" opacity="0.7">脱色剂</text>
  <text x="400" y="530" font-family="Arial, sans-serif" font-size="16" fill="#4a148c" text-anchor="middle" opacity="0.5">高效染料废水脱色处理</text>
</svg>
