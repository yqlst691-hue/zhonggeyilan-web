<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f9a825;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- 装饰圆形 -->
  <circle cx="650" cy="100" r="60" fill="#81c784" opacity="0.3"/>
  <circle cx="100" cy="500" r="80" fill="#4caf50" opacity="0.2"/>
  <circle cx="700" cy="480" r="40" fill="#66bb6a" opacity="0.3"/>
  <!-- 水杯 -->
  <path d="M250 180 L220 480 Q220 510 250 510 L550 510 Q580 510 580 480 L550 180 Z" fill="url(#liquid)" stroke="#f57f17" stroke-width="3"/>
  <!-- 水面波纹 -->
  <ellipse cx="400" cy="190" rx="165" ry="15" fill="#fff9c4" opacity="0.8"/>
  <!-- 絮凝矾花 -->
  <circle cx="340" cy="320" r="30" fill="#fff" opacity="0.7"/>
  <circle cx="380" cy="290" r="25" fill="#fff" opacity="0.6"/>
  <circle cx="420" cy="340" r="35" fill="#fff" opacity="0.65"/>
  <circle cx="460" cy="300" r="20" fill="#fff" opacity="0.5"/>
  <circle cx="360" cy="360" r="18" fill="#fff" opacity="0.55"/>
  <!-- PAC 文字 -->
  <text x="400" y="450" font-family="Arial Black, sans-serif" font-size="72" fill="#33691e" text-anchor="middle" font-weight="bold" opacity="0.6">PAC</text>
  <text x="400" y="500" font-family="Arial, sans-serif" font-size="24" fill="#33691e" text-anchor="middle" opacity="0.7">聚合氯化铝</text>
</svg>
